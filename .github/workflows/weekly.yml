name: weekly-digest

on:
  schedule:
    - cron: "0 1 * * 0"  # 09:00 Sunday Asia/Shanghai
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      PAIGOD_API_KEY: ${{ secrets.PAIGOD_API_KEY }}
      PAIGOD_BASE_URL: ${{ secrets.PAIGOD_BASE_URL }}
      PAIGOD_DEFAULT_MODEL: ${{ secrets.PAIGOD_DEFAULT_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -u scripts/weekly_digest.py
      - name: Commit & push
        run: |
          git config user.name "gh-trending-radar-bot"
          git config user.email "bot@gh-trending-radar"
          git add reports/weekly/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: weekly digest $(date -u +%Y-W%V)"
          git push
